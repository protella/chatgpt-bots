# Sample Slack app manifest for the ChatGPT Slackbot.
#
# Copy this to `slack_app_manifest.yml` (gitignored) and customize the app name,
# bot display name, and slash commands for your environment (e.g. use
# /chatgpt-settings-dev and a "ChatGPT-Dev" bot user for a dev install).
# Paste the result into https://api.slack.com/apps -> Create New App -> From a manifest.
#
# Notes:
# - Enabling the "Agent" toggle in Slack's app settings UI rewrites parts of this
#   manifest server-side (agent_view fields, extra user scopes). That's expected.
# - The search:read.* bot scopes power assistant.search.context (bot-token search,
#   gated on an action token from a triggering message event). Drop the ones you
#   don't want the bot to be able to search (e.g. search:read.im).
display_information:
  name: ChatGPT Slackbot
  description: A Slackbot for ChatGPT integration
  background_color: "#254d23"
  long_description: A Python based Slackbot that interfaces with OpenAI's ChatGPT to bring the ChatGPT functionality to your Slack Workspace. Mention the bot, send it a direct message, or let it participate in channels it has been invited to.
features:
  app_home:
    home_tab_enabled: false
    messages_tab_enabled: true
    messages_tab_read_only_enabled: false
  bot_user:
    display_name: ChatGPT
    always_online: true
  agent_view:
    agent_description: ChatGPT — chat, image generation & editing, vision, and document analysis. Participates in channels it's invited to.
    # Rendered in the agent split view. The ASSISTANT_SUGGESTED_PROMPTS env list only
    # feeds the legacy assistant-thread surface — fill these for the current one.
    suggested_prompts:
      - title: What can you do?
        message: What can you help me with?
      - title: Summarize a document
        message: Summarize this document for me
      - title: Generate an image
        message: "Generate an image of …"
  shortcuts:
    - name: Thread Settings
      type: message
      callback_id: configure_thread_settings
      description: Configure bot settings for this thread
  slash_commands:
    - command: /chatgpt-settings
      description: Configure ChatGPT bot preferences
      usage_hint: Opens bot settings modal
      should_escape: false
oauth_config:
  scopes:
    bot:
      - app_mentions:read
      - assistant:write
      - bookmarks:read       # bookmarks.list
      - bookmarks:write      # bookmarks.add / edit / remove
      - canvases:read        # canvases.sections.lookup
      - canvases:write       # canvases.create / conversations.canvases.create / canvases.edit
      - channels:history
      - channels:join
      - channels:read
      - chat:write
      - chat:write.customize
      - commands
      - emoji:read
      - files:read
      - files:write
      - groups:history
      - groups:read
      - im:history
      - im:read
      - im:write
      - mpim:history
      - mpim:read
      - pins:read            # pins.list — required by the fetch_pinned_messages tool
      - pins:write           # pins.add / pins.remove
      - reactions:read
      - reactions:write
      - search:read.public
      - search:read.private
      - search:read.im
      - search:read.mpim
      - search:read.files
      - search:read.users
      - users:read
      - users:read.email
settings:
  event_subscriptions:
    bot_events:
      - app_mention
      - message.channels
      - message.groups
      - message.im
      - message.mpim
      - reaction_added
      - reaction_removed
      - app_home_opened       # agent_view lifecycle (current)
      - app_context_changed   # agent_view lifecycle (current)
      - assistant_thread_started           # legacy agent surface — remove after code migrates
      - assistant_thread_context_changed   # legacy agent surface — remove after code migrates
  interactivity:
    is_enabled: true
  org_deploy_enabled: false
  socket_mode_enabled: true
  token_rotation_enabled: false
