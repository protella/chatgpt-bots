version: 2
updates:
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "America/Chicago"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
    commit-message:
      prefix: "deps"
      include: "scope"
    # pip-tools two-file layout: edit requirements.in, regenerate requirements.txt.
    # Dependabot updates the lockfile (requirements.txt) but leaves the manifest
    # (requirements.in) untouched. Direct deps are still bumped via the lockfile.
    versioning-strategy: "lockfile-only"
    groups:
      python-minor-patch:
        update-types:
          - "minor"
          - "patch"
